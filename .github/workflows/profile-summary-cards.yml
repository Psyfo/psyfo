name: Generate profile summary cards

on:
  # Regenerate daily so the cards stay current.
  schedule:
    - cron: "30 0 * * *"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:
  # Run once as soon as this lands on the default branch, so the README images populate.
  push:
    branches:
      - main
    # The job commits back to main; without this the commit would re-trigger the job.
    # secrets.GITHUB_TOKEN pushes already skip triggers, but this keeps the guard even
    # if the token is ever swapped for a PAT.
    paths-ignore:
      - "profile-summary-card-output/**"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate the summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # The built-in GITHUB_TOKEN is repo-scoped, so it renders the three
          # repo-derived cards but not the two that read user-level data
          # (profile-details and stats fail with "Resource not accessible by
          # integration"). GITHUB_TOKEN has no permission that grants user reads,
          # so those two need a PAT with public_repo + read:user.
          #
          # Add one as a repo secret named SUMMARY_GITHUB_TOKEN and the next run
          # picks it up and generates all five. No change needed here.
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
          # Bulawayo is UTC+2; keeps the productive-time radar honest.
          UTC_OFFSET: 2
          THEME: "tokyonight"
          AUTO_PUSH: true
